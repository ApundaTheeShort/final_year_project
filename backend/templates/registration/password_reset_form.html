{% extends "base.html" %}

{% block title %}Reset Password{% endblock %}

{% block content %}
<h1>Reset password</h1>
<p>Enter the email address attached to your account and we will send reset instructions.</p>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Send reset link</button>
</form>
{% endblock %}
